version: '3.8'

services:
  # 1. Main Laravel Application (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learnlink-app
    restart: always
    volumes:
      - .:/var/www
    env_file:
      - .env

  # 2. Web Server (Nginx)
  web:
    image: nginx:alpine
    container_name: learnlink-web
    restart: always
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  # 3. Laravel Reverb (WebSockets Server)
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learnlink-reverb
    restart: always
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www
    env_file:
      - .env
    depends_on:
      - app

  # 4. Queue Worker (Processes welcome emails, etc.)
  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learnlink-queue-worker
    restart: always
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - .:/var/www
    env_file:
      - .env
    depends_on:
      - app

  # 5. Cron Scheduler (Runs subscription checks daily, reset AI tokens monthly)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learnlink-scheduler
    restart: always
    entrypoint: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - .:/var/www
    env_file:
      - .env
    depends_on:
      - app
